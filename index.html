<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, intial-scale=1.0">    
    <title>Mission Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h2>MISSION CONTROL</h2>
        
    <div class="selection">
        <button id="agentBtn">Agent Type</button>
        <span id="agentDisplay">Not Selected</span>
    </div>
    
    <div class="selection">
        <button id="locationBtn">Location</button>
        <span id="locationDisplay">Not Selected</span>
    </div>

    <div class="selection">
        <button id="weaponBtn">Weapon Loadout</button>
        <span id="weaponDisplay">Not Selected</span>
    </div>

    <div class="selection">
        <button id="objectiveBtn">Objective</button>
        <span id="objectiveDisplay">Not Selected</span>
    </div>

    <div class="selection">
        <button id="riskBtn">Risk Level</button>
        <span id="riskDisplay">Not Selected</span>
    </div>

    <div class="selection">
        <button id="launchBtn">LAUNCH MISSION</button>
        <button id="randomBtn">RANDOM MISSION</button>
        <button id="resetBtn">RESET</button>
    </div>
    <div id="output"></div>
</div>
<script src="script.js"></script>
</body>
</html>
